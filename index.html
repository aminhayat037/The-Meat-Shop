<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}

/* BANNER */
.top-banner {background:linear-gradient(90deg,#8b0000,#ff2a2a);}
.banner-track {color:white;padding:12px;text-align:center;font-weight:500;}

/* HEADER */
.main-header {text-align:center;background:white;padding:30px;}
.logo {font-size:38px;font-weight:600;}

.menu {display:flex;justify-content:center;gap:30px;list-style:none;padding:0;}
.menu li {cursor:pointer;}

.dropdown-content {
display:none;position:absolute;background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
border-radius:10px;
}
.dropdown:hover .dropdown-content {display:block;}
.dropdown-content li {padding:12px;}

/* HERO */
.hero {
height:50vh;
background:url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') center/cover;
display:flex;align-items:center;justify-content:center;
color:white;font-size:40px;font-weight:600;
}

/* PRODUCTS */
.products {
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}
.product {
background:white;border-radius:15px;overflow:hidden;
transition:0.3s;
}
.product:hover {transform:translateY(-8px);box-shadow:0 10px 25px rgba(0,0,0,0.1);}
.product img {width:100%;height:200px;object-fit:cover;}
.product-info {padding:15px;}

button {
background:black;color:white;padding:10px;border:none;width:100%;cursor:pointer;
}

/* SECTIONS */
.section {background:white;margin:20px;padding:25px;border-radius:10px;}

input, textarea, select {
width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:5px;
}

</style>

</head>

<body>

<div class="top-banner">
<div class="banner-track">
🚚 Fresh Halal Meat Delivered • East Village London • Order via WhatsApp
</div>
</div>

<header class="main-header">
<h1 class="logo">The Meat Shop</h1>

<ul class="menu">
<li class="dropdown">Shop ▼
<ul class="dropdown-content">
<li onclick="filterProducts('all')">All</li>
<li onclick="filterProducts('beef')">Beef</li>
<li onclick="filterProducts('chicken')">Chicken</li>
<li onclick="filterProducts('lamb')">Lamb</li>
</ul>
</li>
<li onclick="scrollTo('cart')">Cart</li>
<li onclick="scrollTo('checkout')">Checkout</li>
<li onclick="scrollTo('account')">Account</li>
</ul>
</header>

<section class="hero">Premium Halal Butcher</section>

<section class="products" id="products"></section>

<!-- CART -->

<section class="section" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: £<span id="total">0</span></h3>
<button onclick="sendWhatsApp()">Order via WhatsApp</button>
</section>

<!-- CHECKOUT -->

<section class="section" id="checkout">
<h2>Checkout</h2>
<input id="name" placeholder="Full Name">
<input id="address" placeholder="Address">
<input id="postcode" placeholder="Postcode">
<select id="payment">
<option>Cash on Delivery</option>
<option>Card on Collection</option>
</select>
<button onclick="placeOrder()">Place Order</button>
<p id="orderStatus"></p>
</section>

<!-- ACCOUNT / INQUIRY -->

<section class="section" id="account">
<h2>Customer Inquiry / Account</h2>
<input placeholder="Your Name">
<input placeholder="Email">
<textarea placeholder="Your message or inquiry"></textarea>
<button onclick="alert('Inquiry sent! (demo)')">Submit</button>
</section>

<script>

/* CHANGE THIS TO YOUR NUMBER */
const whatsappNumber = "447000000000";

const products = [
{name:"Beef Steak",price:12,category:"beef",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6,category:"chicken",img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:10,category:"lamb",img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"}
];

let cart=[];

function displayProducts(list){
let container=document.getElementById("products");
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<p>£${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
</div>
</div>`;
});
}
displayProducts(products);

function filterProducts(cat){
if(cat==="all"){displayProducts(products);}
else{displayProducts(products.filter(p=>p.category===cat));}
}

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;
container.innerHTML+=`
<div>${item.name} - £${item.price}
<button onclick="removeItem(${i})">X</button></div>`;
});

document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

/* WHATSAPP ORDER */
function sendWhatsApp(){
if(cart.length===0){
alert("Cart is empty");
return;
}

let message="Order from The Meat Shop:%0A";

cart.forEach(item=>{
message+=`${item.name} - £${item.price}%0A`;
});

window.open(`https://wa.me/${whatsappNumber}?text=${message}`);
}

/* CHECKOUT */
function placeOrder(){
let name=document.getElementById("name").value;
let address=document.getElementById("address").value;

if(!name || !address){
document.getElementById("orderStatus").innerText="Please fill all fields";
return;
}

document.getElementById("orderStatus").innerText="✅ Order placed (demo)";
}

/* SCROLL */
function scrollTo(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
