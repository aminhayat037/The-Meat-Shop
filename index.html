<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--black:#0e0e0e;
--cream:#f6f4f1;
--red:#8b0000;
}

body{
margin:0;
font-family:Poppins;
background:var(--cream);
color:#1a1a1a;
overflow-x:hidden;
}

/* TOP BAR */
.topbar{
background:var(--black);
color:white;
display:flex;
justify-content:space-between;
padding:10px 20px;
font-size:13px;
letter-spacing:1px;
}

.topbar div{cursor:pointer;opacity:0.9;transition:0.3s;}
.topbar div:hover{opacity:1}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-family:"Playfair Display";
font-size:28px;
}

.nav{
display:flex;
gap:20px;
font-size:13px;
text-transform:uppercase;
}

.nav div{
cursor:pointer;
opacity:0.7;
transition:0.3s;
}
.nav div:hover{opacity:1}

/* HERO */
.hero{
height:65vh;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-family:"Playfair Display";
font-size:50px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:40px 60px;
}

.product{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.35s ease;
}

.product:hover{
transform:translateY(-6px);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.product-info h3{
font-family:"Playfair Display";
margin:0;
}

.price{
color:var(--red);
margin:5px 0;
}

/* BUTTON */
button{
background:var(--black);
color:white;
border:none;
padding:12px;
width:100%;
cursor:pointer;
transition:0.25s;
}

button:hover{
background:var(--red);
}

/* CART */
.cart-icon{
position:relative;
cursor:pointer;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:var(--red);
color:white;
border-radius:50%;
padding:3px 7px;
font-size:12px;
}

/* CART PANEL */
.cart-panel{
position:fixed;
top:0;
right:-420px;
width:360px;
height:100%;
background:white;
box-shadow:-20px 0 40px rgba(0,0,0,0.2);
transition:0.35s cubic-bezier(0.4,0,0.2,1);
padding:15px;
z-index:2000;
}

.cart-panel.active{right:0}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}
.overlay.active{display:block}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.qty{
display:flex;
gap:6px;
align-items:center;
}

.qty button{
width:26px;
height:26px;
background:#eee;
color:black;
border:none;
cursor:pointer;
border-radius:4px;
}

/* DELETE BUTTON */
.delete{
background:#ddd;
color:#000;
padding:6px 8px;
font-size:12px;
border:none;
cursor:pointer;
border-radius:4px;
transition:0.2s;
}
.delete:hover{
background:#bbb;
}
</style>

</head>

<body>

<!-- TOP BAR -->

<div class="topbar">
<div>🟢 100% Halal • Fresh Meat • Open Daily</div>
<div onclick="scrollToSection('find')">📍 Find Us</div>
</div>

<!-- HEADER -->

<header>
<div class="logo">The Meat Shop</div>

<div class="nav">
<div onclick="scrollToSection('products')">Shop</div>
<div onclick="scrollToSection('find')">Location</div>
<div onclick="openCart()">Cart 🛒 <span id="count">0</span></div>
</div>
</header>

<!-- HERO -->

<section class="hero">
<h1>Premium Halal Butchery</h1>
</section>

<!-- PRODUCTS -->

<section class="products" id="products"></section>

<!-- CART -->

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-panel" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<h3>Total: £<span id="total">0</span></h3>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>

<!-- DELIVERY TEXT (FIXED WORDING) -->

<section style="padding:25px;background:white;margin:20px;border-radius:10px;">
<h3>Check your postcode here to see if we deliver to your area</h3>
<input id="postcode" placeholder="Enter postcode">
<button onclick="checkDelivery()">Check</button>
<p id="deliveryResult"></p>
</section>

<!-- FIND -->

<section id="find" style="padding:40px;background:white;margin:20px;border-radius:10px;">
<h2>Find Us</h2>
<p>Unit 5.1 Celebration Avenue, E20 1DB, London</p>

<iframe style="width:100%;height:300px;border:0;border-radius:10px;"
src="https://www.google.com/maps?q=E20+1DB&output=embed"></iframe>
</section>

<script>

const products=[
{name:"Beef Steak",price:12,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6,img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:10,img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

/* DISPLAY */
function show(){
let c=document.getElementById("products");
c.innerHTML="";
products.forEach(p=>{
c.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<div class="price">£${p.price}</div>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>
</div>`;
});
}
show();

/* ADD */
function add(name,price){
let i=cart.find(x=>x.name===name);
if(i)i.qty++;
else cart.push({name,price,qty:1});

save();
update();
openCart();
}

/* UPDATE CART */
function update(){
let c=document.getElementById("cartItems");
c.innerHTML="";
let total=0;

cart.forEach((i,idx)=>{
total+=i.price*i.qty;

c.innerHTML+=`
<div class="cart-item">
<div>
<strong>${i.name}</strong><br>
£${i.price}
</div>

<div class="qty">
<button onclick="change(${idx},-1)">-</button>
<span>${i.qty}</span>
<button onclick="change(${idx},1)">+</button>
</div>

<button class="delete" onclick="removeItem(${idx})">Remove</button>
</div>`;
});

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.reduce((a,b)=>a+b.qty,0);

save();
}

/* QTY */
function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
update();
}

/* REMOVE ITEM */
function removeItem(i){
cart.splice(i,1);
update();
}

/* CART UI */
function openCart(){
document.getElementById("cart").classList.add("active");
document.getElementById("overlay").classList.add("active");
update();
}

function closeCart(){
document.getElementById("cart").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* CHECKOUT */
function checkout(){
let msg="Order:%0A";

cart.forEach(i=>{
msg+=`${i.name} x${i.qty}%0A`;
});

window.open("https://wa.me/447000000000?text="+msg);
}

/* DELIVERY (placeholder kept simple) */
function checkDelivery(){
document.getElementById("deliveryResult").innerText=
"Delivery check system active (can upgrade to full radius logic next step)";
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

update();

</script>

</body>
</html>
