<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f6f4f1;
}

/* TOP BAR */
.topbar{
background:#0e0e0e;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
font-size:13px;
}

.nav{
display:flex;
gap:18px;
font-size:12px;
text-transform:uppercase;
letter-spacing:1px;
}

.nav span{
cursor:pointer;
opacity:0.8;
transition:0.2s;
}

.nav span:hover{
opacity:1;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-family:"Playfair Display";
font-size:26px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product-info{
padding:12px;
}

.price{
color:#8b0000;
}

/* BUTTON */
button{
width:100%;
padding:10px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

button:hover{
background:#8b0000;
}

/* CART */
.cart-panel{
position:fixed;
top:0;
right:-420px;
width:360px;
height:100%;
background:white;
transition:0.3s;
box-shadow:-10px 0 30px rgba(0,0,0,0.2);
padding:15px;
z-index:2000;
}

.cart-panel.active{right:0}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}
.overlay.active{display:block}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.qty button{
width:26px;
height:26px;
background:#eee;
border:none;
cursor:pointer;
}

/* SECTIONS */
.section{
margin:20px;
padding:20px;
background:white;
border-radius:10px;
}
</style>

</head>

<body>

<!-- TOP BAR (FIXED NAVIGATION) -->

<div class="topbar">

<div>🟢 The Meat Shop • 100% Halal Fresh Meat</div>

<div class="nav">
<span onclick="scrollToSection('home')">Home</span>
<span onclick="scrollToSection('shop')">Shop</span>
<span onclick="scrollToSection('find')">Location</span>
<span onclick="scrollToSection('account')">Account</span>
<span onclick="openCart()">Cart 🛒 (<span id="count">0</span>)</span>
</div>

</div>

<!-- HEADER -->

<header id="home">
<div class="logo">The Meat Shop</div>
</header>

<!-- PRODUCTS -->

<section id="shop" class="products"></section>

<!-- CART -->

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-panel" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<h3>Total: £<span id="total">0</span></h3>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>

<!-- POSTCODE -->

<section class="section">
<h3>Check your postcode here to see if we deliver to your area</h3>
<input id="postcode" placeholder="Enter postcode">
<button onclick="checkDelivery()">Check</button>
<p id="deliveryResult"></p>
</section>

<!-- FIND -->

<section id="find" class="section">
<h2>Location</h2>
<p>Unit 5.1 Celebration Avenue, E20 1DB, London</p>

<iframe style="width:100%;height:300px;border:0;border-radius:10px;"
src="https://www.google.com/maps?q=E20+1DB&output=embed"></iframe>
</section>

<!-- ACCOUNT -->

<section id="account" class="section">
<h2>Account</h2>
<input placeholder="Name">
<input placeholder="Email">
<button>Login / Create Account</button>
</section>

<script>

/* PRODUCTS */
const products=[
{name:"Beef Steak",price:12.99,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6.99,img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:11.99,img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"},
{name:"Minced Beef",price:7.99,img:"https://images.unsplash.com/photo-1604908177000-2a0b3c4f4b11"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

/* RENDER */
function render(){
let c=document.getElementById("shop");
c.innerHTML="";
products.forEach(p=>{
c.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<p class="price">£${p.price} / kg</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>
</div>`;
});
}

/* ADD */
function add(name,price){
let i=cart.find(x=>x.name===name);
if(i)i.qty++;
else cart.push({name,price,qty:1});
save();update();openCart();
}

/* CART */
function update(){
let c=document.getElementById("cartItems");
c.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;

c.innerHTML+=`
<div class="cart-item">
<div><strong>${i.name}</strong></div>

<div>
<button onclick="change('${i.name}',-1)">-</button>
<span>${i.qty}</span>
<button onclick="change('${i.name}',1)">+</button>
</div>
</div>`;
});

document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("count").innerText=cart.reduce((a,b)=>a+b.qty,0);
save();
}

function change(name,v){
let i=cart.find(x=>x.name===name);
i.qty+=v;
if(i.qty<=0) cart=cart.filter(x=>x.name!==name);
update();
}

/* CART UI */
function openCart(){
document.getElementById("cart").classList.add("active");
document.getElementById("overlay").classList.add("active");
update();
}

function closeCart(){
document.getElementById("cart").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* CHECKOUT */
function checkout(){
let msg="Order:%0A";
cart.forEach(i=>{
msg+=`${i.name} x${i.qty}%0A`;
});
window.open("https://wa.me/447000000000?text="+msg);
}

/* NAV */
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* SAVE */
function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

render();update();

</script>

</body>
</html>
