<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#f6f4f1;color:#111}
.topbar{background:#0e0e0e;color:white;display:flex;justify-content:space-between;padding:12px 20px}
.nav span{cursor:pointer;margin-left:15px}
.hero{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092") center/cover;color:white}
.hero h1{font-size:50px;font-family:Playfair Display}
button{background:#111;color:white;border:none;padding:10px;cursor:pointer;width:100%}
button:hover{background:#8b0000}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;padding:30px}
.product{background:white;border-radius:10px;overflow:hidden}
.product img{width:100%;height:180px;object-fit:cover}
.product-info{padding:10px}
.price{color:#8b0000}

.cart-panel{position:fixed;right:-400px;top:0;width:340px;height:100%;background:white;transition:0.3s;padding:15px}
.cart-panel.active{right:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:black;opacity:0.5;display:none}
.overlay.active{display:block}
.cart-item{display:flex;justify-content:space-between;margin:10px 0}

.section{margin:20px;padding:20px;background:white;border-radius:10px}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<div>The Meat Shop • 100% Halal</div>
<div class="nav">
<span onclick="go('home')">Home</span>
<span onclick="go('shop')">Shop</span>
<span onclick="go('delivery')">Delivery</span>
<span onclick="openCart()">Cart (<span id="count">0</span>)</span>
</div>
</div>

<!-- HERO -->
<section id="home" class="hero">
<h1>Fresh Halal Meat Delivered</h1>
<p>Premium quality meat delivered with flexible time slots</p>
<button onclick="go('shop')">Shop Now</button>
</section>

<!-- SHOP -->
<section id="shop" class="products"></section>

<!-- DELIVERY SLOT BOOKING -->
<section id="delivery" class="section">
<h2>Select Delivery Slot</h2>

<label>Select Date:</label>
<input type="date" id="date">

<br><br>

<label>Select Time Slot:</label>
<select id="slot">
<option>10:00 - 12:00 (Morning)</option>
<option>12:00 - 15:00 (Afternoon)</option>
<option>15:00 - 18:00 (Evening)</option>
</select>
</section>

<!-- CART -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-panel" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<h3>Total: £<span id="total">0</span></h3>

<button onclick="checkout()">Checkout via WhatsApp</button>
</div>

<script>

const products=[
{name:"Beef Steak",price:12.99,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6.99,img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:11.99,img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"},
{name:"Minced Beef",price:7.99,img:"https://images.unsplash.com/photo-1604908177000-2a0b3c4f4b11"}
];

let cart=[];

function render(){
let box=document.getElementById("shop");
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<p class="price">£${p.price}</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>
</div>`;
});
}

function add(name,price){
let i=cart.find(x=>x.name===name);
if(i)i.qty++;else cart.push({name,price,qty:1});
update();openCart();
}

function update(){
let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
box.innerHTML+=`
<div class="cart-item">
<div>${i.name} x${i.qty}</div>
</div>`;
});

document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("count").innerText=cart.length;
}

function openCart(){
document.getElementById("cart").classList.add("active");
document.getElementById("overlay").classList.add("active");
update();
}

function closeCart(){
document.getElementById("cart").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

function go(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* ⭐ DELIVERY SLOT INCLUDED IN CHECKOUT */
function checkout(){

let date=document.getElementById("date").value;
let slot=document.getElementById("slot").value;

if(!date){
alert("Please select delivery date");
return;
}

let msg="Order:%0A";

cart.forEach(i=>{
msg+=`${i.name} x${i.qty}%0A`;
});

msg+=`%0ADelivery Date: ${date}`;
msg+=`%0ADelivery Slot: ${slot}`;

window.open("https://wa.me/447000000000?text="+msg);
}

render();
</script>

</body>
</html>
