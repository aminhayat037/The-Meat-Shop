<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--black:#0e0e0e;
--cream:#f6f4f1;
--red:#8b0000;
}

body{
margin:0;
font-family:Poppins;
background:var(--cream);
overflow-x:hidden;
}

/* TOP BAR */
.topbar{
background:var(--black);
color:white;
display:flex;
justify-content:space-between;
padding:10px 20px;
font-size:13px;
}

.topbar div{cursor:pointer;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-family:"Playfair Display";
font-size:28px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:40px;
}

.product{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.price{color:var(--red);}

/* BUTTON */
button{
background:var(--black);
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:var(--red);
}

/* CART */
.cart-panel{
position:fixed;
top:0;
right:-420px;
width:360px;
height:100%;
background:white;
transition:0.3s;
padding:15px;
z-index:2000;
box-shadow:-10px 0 30px rgba(0,0,0,0.2);
}

.cart-panel.active{right:0}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}
.overlay.active{display:block}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.qty{
display:flex;
gap:6px;
align-items:center;
}

.qty button{
width:26px;
height:26px;
}

/* REMOVE */
.remove{
background:#ddd;
color:black;
font-size:11px;
padding:5px;
border:none;
cursor:pointer;
border-radius:4px;
}
</style>

</head>

<body>

<!-- TOP BAR -->

<div class="topbar">
<div>🟢 100% Halal • Fresh Meat • Open Daily</div>
<div onclick="scrollToFind()">📍 Find Us</div>
</div>

<!-- HEADER -->

<header>
<div class="logo">The Meat Shop</div>
<div onclick="openCart()" style="cursor:pointer">
🛒 Cart (<span id="count">0</span>)
</div>
</header>

<!-- PRODUCTS -->

<section class="products" id="products"></section>

<!-- CART -->

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-panel" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<h3>Total: £<span id="total">0</span></h3>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>

<!-- DELIVERY CHECK -->

<section style="padding:25px;background:white;margin:20px;border-radius:10px;">
<h3>Check your postcode here to see if we deliver to your area</h3>
<input id="postcode" placeholder="Enter postcode">
<button onclick="checkDelivery()">Check Delivery</button>
<p id="deliveryResult"></p>
</section>

<!-- FIND -->

<section id="find" style="padding:40px;background:white;margin:20px;border-radius:10px;">
<h2>Find Us</h2>
<p>Unit 5.1 Celebration Avenue, E20 1DB, London</p>

<iframe style="width:100%;height:300px;border:0;border-radius:10px;"
src="https://www.google.com/maps?q=E20+1DB&output=embed"></iframe>
</section>

<script>

const products=[
{name:"Beef Steak",price:12,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6,img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:10,img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"},
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

/* DISPLAY */
function show(){
let c=document.getElementById("products");
c.innerHTML="";
products.forEach(p=>{
c.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<p class="price">£${p.price}</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>
</div>`;
});
}
show();

/* ADD */
function add(name,price){
let i=cart.find(x=>x.name===name);
if(i)i.qty++;
else cart.push({name,price,qty:1});

save();
update();
openCart();
}

/* UPDATE */
function update(){
let c=document.getElementById("cartItems");
c.innerHTML="";
let total=0;

cart.forEach((i,idx)=>{
total+=i.price*i.qty;

c.innerHTML+=`
<div class="cart-item">
<div>
<strong>${i.name}</strong><br>
£${i.price}
</div>

<div class="qty">
<button onclick="change(${idx},-1)">-</button>
<span>${i.qty}</span>
<button onclick="change(${idx},1)">+</button>
</div>

<button class="remove" onclick="removeItem(${idx})">X</button>
</div>`;
});

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.reduce((a,b)=>a+b.qty,0);

save();
}

/* CHANGE QTY */
function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
update();
}

/* REMOVE */
function removeItem(i){
cart.splice(i,1);
update();
}

/* CART UI */
function openCart(){
document.getElementById("cart").classList.add("active");
document.getElementById("overlay").classList.add("active");
update();
}

function closeCart(){
document.getElementById("cart").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* CHECKOUT */
function checkout(){
let msg="Order:%0A";

cart.forEach(i=>{
msg+=`${i.name} x${i.qty}%0A`;
});

window.open("https://wa.me/447000000000?text="+msg);
}

/* POSTCODE CHECKER (RESTORED PROPERLY) */
async function checkDelivery(){

let pc=document.getElementById("postcode").value;
if(!pc) return;

let res=await fetch("https://api.postcodes.io/postcodes/"+pc);
let data=await res.json();

let r=document.getElementById("deliveryResult");

if(!data.result){
r.innerText="Invalid postcode";
r.style.color="red";
return;
}

/* SIMPLE 2 MILE LOGIC (REAL COORD BASED) */
const shopLat=51.5433;
const shopLng=-0.0077;

function dist(lat1,lon1,lat2,lon2){
const R=3958.8;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

let d=dist(shopLat,shopLng,data.result.latitude,data.result.longitude);

if(d<=2){
r.innerText="We deliver to you ("+d.toFixed(2)+" miles)";
r.style.color="green";
}else{
r.innerText="Outside delivery area ("+d.toFixed(2)+" miles)";
r.style.color="red";
}
}

function scrollToFind(){
document.getElementById("find").scrollIntoView({behavior:"smooth"});
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

update();

</script>

</body>
</html>
