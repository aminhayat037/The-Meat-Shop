<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;overflow-x:hidden;}

/* HEADER */
.main-header {
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:20px;
position:sticky;
top:0;
z-index:1000;
}

.logo {font-size:28px;font-weight:600;}

.menu {display:flex;gap:20px;list-style:none;}
.menu li {cursor:pointer;}

.cart-icon {
position:relative;
cursor:pointer;
font-size:22px;
}

.cart-count {
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
border-radius:50%;
padding:3px 7px;
font-size:12px;
}

/* PRODUCTS */
.products {
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product {
background:white;
border-radius:15px;
overflow:hidden;
}

.product img {
width:100%;
height:200px;
object-fit:cover;
}

.product-info {padding:15px;}

button {
background:black;
color:white;
padding:10px;
border:none;
cursor:pointer;
width:100%;
}

/* CART PANEL */
.cart-panel {
position:fixed;
top:0;
right:-420px;
width:380px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
transition:0.4s;
padding:20px;
z-index:2000;
}

.cart-panel.active {right:0;}

.overlay {
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}

.overlay.active {display:block;}

.close-btn {cursor:pointer;font-size:18px;margin-bottom:10px;}

/* CART ITEM */
.cart-item {
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
padding:10px;
border-bottom:1px solid #eee;
}

.qty-controls {
display:flex;
align-items:center;
gap:8px;
}

.qty-controls button {
width:30px;
height:30px;
border-radius:5px;
}

/* CHECKOUT */
.section {
background:white;
margin:20px;
padding:25px;
border-radius:10px;
}

input {
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:5px;
}

</style>

</head>

<body>

<header class="main-header">
<h1 class="logo">The Meat Shop</h1>

<ul class="menu">
<li onclick="scrollToSection('products')">Shop</li>
<li onclick="scrollToSection('checkout')">Checkout</li>
</ul>

<div class="cart-icon" onclick="openCart()">
🛒
<div class="cart-count" id="cartCount">0</div>
</div>
</header>

<section class="products" id="products"></section>

<!-- CART -->

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-panel" id="cartPanel">
<div class="close-btn" onclick="closeCart()">✖ Close</div>

<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: £<span id="total">0</span></h3>

<button onclick="sendWhatsApp()">Order via WhatsApp</button>

</div>

<!-- CHECKOUT -->

<section class="section" id="checkout">
<h2>Checkout</h2>
<input id="name" placeholder="Full Name">
<input id="address" placeholder="Address">
<button onclick="placeOrder()">Place Order</button>
<p id="orderStatus"></p>
</section>

<script>

/* PRODUCTS */
const products = [
{name:"Beef Steak",price:12,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6,img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:10,img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"}
];

/* CART (NOW WITH QUANTITY) */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SAVE CART */
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

/* DISPLAY PRODUCTS */
function displayProducts(){
let container=document.getElementById("products");
container.innerHTML="";
products.forEach(p=>{
container.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<p>£${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
</div>`;
});
}
displayProducts();

/* ADD TO CART (WITH QTY) */
function addToCart(name,price){
let item = cart.find(i=>i.name===name);

if(item){
item.qty += 1;
}else{
cart.push({name,price,qty:1});
}

saveCart();
updateCart();
openCart();
}

/* UPDATE CART */
function updateCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;

cart.forEach((item,i)=>{
total += item.price * item.qty;

container.innerHTML+=`
<div class="cart-item">
<div>
<strong>${item.name}</strong><br>
£${item.price}
</div>

<div class="qty-controls">
<button onclick="changeQty(${i},-1)">-</button>
<span>${item.qty}</span>
<button onclick="changeQty(${i},1)">+</button>
</div>
</div>`;
});

document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0);

saveCart();
}

/* CHANGE QTY */
function changeQty(i,amount){
cart[i].qty += amount;

if(cart[i].qty <= 0){
cart.splice(i,1);
}

updateCart();
}

/* CART PANEL */
function openCart(){
document.getElementById("cartPanel").classList.add("active");
document.getElementById("overlay").classList.add("active");
updateCart();
}

function closeCart(){
document.getElementById("cartPanel").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* WHATSAPP */
function sendWhatsApp(){
let message="Order from The Meat Shop:%0A";

cart.forEach(item=>{
message+=`${item.name} x${item.qty} - £${item.price * item.qty}%0A`;
});

window.open("https://wa.me/447000000000?text="+message);
}

/* CHECKOUT */
function placeOrder(){
let name=document.getElementById("name").value;
let address=document.getElementById("address").value;

if(!name || !address){
document.getElementById("orderStatus").innerText="Fill all fields";
return;
}

document.getElementById("orderStatus").innerText="Order placed!";
}

/* SCROLL */
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* LOAD CART ON START */
updateCart();

</script>

</body>
</html>
