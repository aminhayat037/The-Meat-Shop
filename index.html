<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<style>
body {margin:0;font-family:Arial;background:#fafafa;}

.top-banner {
background:linear-gradient(90deg,#b30000,#ff1a1a);
overflow:hidden;
white-space:nowrap;
}
.banner-track {
display:inline-block;
padding:12px;
color:white;
font-weight:600;
animation:scroll 15s linear infinite;
}
@keyframes scroll {
from {transform:translateX(0);}
to {transform:translateX(-50%);}
}

.main-header {
text-align:center;
padding:20px;
background:white;
}
.logo {font-size:32px;font-weight:bold;}

.nav-bar {display:flex;justify-content:center;}
.menu {display:flex;gap:25px;list-style:none;padding:0;}

.dropdown-content {
display:none;
position:absolute;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.dropdown:hover .dropdown-content {display:block;}
.dropdown-content li {padding:10px;cursor:pointer;}

.products {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}
.product {
background:white;
padding:15px;
border-radius:10px;
transition:0.3s;
}
.product:hover {transform:translateY(-5px);}
.product img {width:100%;border-radius:8px;}

button {
background:black;
color:white;
padding:10px;
border:none;
cursor:pointer;
width:100%;
}

.cart, .checkout, .delivery {
padding:20px;
background:white;
margin:20px;
border-radius:10px;
}

input, select {
width:100%;
padding:10px;
margin-bottom:10px;
}
</style>

</head>

<body>

<div class="top-banner">
<div class="banner-track">
🚚 We Deliver Fresh Meat • 100% Halal • East Village • 🚚 We Deliver Fresh Meat • 100% Halal
</div>
</div>

<header class="main-header">
<h1 class="logo">The Meat Shop</h1>

<nav class="nav-bar">
<ul class="menu">
<li class="dropdown">
Shop ▼
<ul class="dropdown-content">
<li onclick="filterProducts('all')">All</li>
<li onclick="filterProducts('beef')">Beef</li>
<li onclick="filterProducts('chicken')">Chicken</li>
<li onclick="filterProducts('lamb')">Lamb</li>
<li onclick="filterProducts('fish')">Fish</li>
</ul>
</li>
<li onclick="scrollToCart()">Cart 🛒</li>
</ul>
</nav>
</header>

<section class="products" id="products"></section>

<section class="cart" id="cart">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3>Total: £<span id="total">0</span></h3>
</section>

<section class="delivery">
<h2>Check Delivery</h2>
<input id="postcode" placeholder="Enter postcode">
<button onclick="checkPostcode()">Check</button>
<p id="deliveryResult"></p>
</section>

<section class="checkout">
<h2>Checkout</h2>
<input placeholder="Full Name">
<input placeholder="Address">
<input placeholder="Postcode">
<select>
<option>Cash on Delivery</option>
<option>Card on Collection</option>
</select>
<button>Place Order</button>
</section>

<script>
const products = [
{name:"Beef Steak",price:12,category:"beef",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6,category:"chicken",img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:10,category:"lamb",img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"},
{name:"Salmon Fillet",price:9,category:"fish",img:"https://images.unsplash.com/photo-1604908811971-7d5b0e54796a"}
];

let cart = [];

function displayProducts(list){
const container=document.getElementById("products");
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>£${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
}
displayProducts(products);

function filterProducts(cat){
if(cat==="all"){displayProducts(products);}
else{displayProducts(products.filter(p=>p.category===cat));}
}

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
const container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;
cart.forEach((item,i)=>{
total+=item.price;
container.innerHTML+=`
<div>
${item.name} - £${item.price}
<button onclick="removeItem(${i})">X</button>
</div>`;
});
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function scrollToCart(){
document.getElementById("cart").scrollIntoView({behavior:"smooth"});
}

function checkPostcode(){
let pc=document.getElementById("postcode").value.toUpperCase();
let result=document.getElementById("deliveryResult");

if(pc.startsWith("E20")||pc.startsWith("E15")||pc.startsWith("E13")){
result.innerText="✅ Delivery Available";
result.style.color="green";
}else{
result.innerText="❌ Outside Delivery Radius";
result.style.color="red";
}
}
</script>

</body>
</html>
