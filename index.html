<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#f6f4f1}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px 30px;
background:white;
position:sticky;
top:0;
z-index:1000;
}

.logo{font-family:"Playfair Display";font-size:26px}

.nav{display:flex;gap:20px;font-size:13px}
.nav div{cursor:pointer;opacity:0.7}
.nav div:hover{opacity:1}

/* CART */
.cart-icon{position:relative;cursor:pointer}
.cart-count{
position:absolute;
top:-8px;right:-10px;
background:#8b0000;
color:white;
border-radius:50%;
padding:3px 7px;
font-size:12px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.product{
background:white;
border-radius:12px;
overflow:hidden;
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product-info{padding:15px}

button{
width:100%;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
}

/* CART */
.cart-panel{
position:fixed;
top:0;
right:-420px;
width:360px;
height:100%;
background:white;
transition:0.3s;
padding:15px;
z-index:2000;
box-shadow:-10px 0 30px rgba(0,0,0,0.2);
}
.cart-panel.active{right:0}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:1500;
}
.overlay.active{display:block}

/* ACCOUNT PANEL */
.account-panel{
position:fixed;
left:-380px;
top:0;
width:340px;
height:100%;
background:white;
transition:0.3s;
padding:15px;
z-index:2000;
box-shadow:10px 0 30px rgba(0,0,0,0.1);
}
.account-panel.active{left:0}

/* INPUTS */
input,select{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ddd;
}

/* DELIVERY */
.section{
padding:25px;
background:white;
margin:20px;
border-radius:10px;
}
</style>

</head>

<body>

<header>
<div class="logo">The Meat Shop</div>

<div class="nav">
<div onclick="openAccount()">Account</div>
<div onclick="openCart()">Cart 🛒 <span id="count">0</span></div>
</div>
</header>

<!-- PRODUCTS -->

<section class="products" id="products"></section>

<!-- CART -->

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="cart-panel" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<h3>Total: £<span id="total">0</span></h3>

<select id="slot">
<option value="">Select Delivery Slot</option>
<option>Morning (8am–11am)</option>
<option>Afternoon (12pm–3pm)</option>
<option>Evening (4pm–7pm)</option>
</select>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>

<!-- ACCOUNT -->

<div class="account-panel" id="account">
<h3>Account</h3>

<div id="authSection">
<input id="loginName" placeholder="Name">
<input id="loginEmail" placeholder="Email">

<button onclick="login()">Login / Create Account</button>

</div>

<p id="userInfo"></p>
</div>

<!-- DELIVERY -->

<section class="section">
<h3>Delivery Check (2 Mile Radius)</h3>
<input id="postcode" placeholder="Enter postcode">
<button onclick="checkDelivery()">Check</button>
<p id="deliveryResult"></p>
</section>

<script>

const shopLat = 51.5433;
const shopLng = -0.0077;

/* PRODUCTS */
const products=[
{name:"Beef Steak",price:12,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6,img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:10,img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let user=JSON.parse(localStorage.getItem("user"))||null;

/* DISPLAY */
function show(){
let c=document.getElementById("products");
c.innerHTML="";
products.forEach(p=>{
c.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<p>£${p.price}</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>
</div>`;
});
}
show();

/* CART */
function add(name,price){
let i=cart.find(x=>x.name===name);
if(i)i.qty++;
else cart.push({name,price,qty:1});

save();
update();
openCart();
}

function update(){
let c=document.getElementById("cartItems");
c.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
c.innerHTML+=`<p>${i.name} x${i.qty}</p>`;
});

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.reduce((a,b)=>a+b.qty,0);
save();
}

/* ACCOUNT */
function login(){
let name=document.getElementById("loginName").value;
let email=document.getElementById("loginEmail").value;

if(!name||!email)return;

user={name,email};
localStorage.setItem("user",JSON.stringify(user));

document.getElementById("userInfo").innerText=
"Logged in as "+name;
}

/* CART UI */
function openCart(){
document.getElementById("cart").classList.add("active");
document.getElementById("overlay").classList.add("active");
update();
}

function openAccount(){
document.getElementById("account").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeAll(){
document.getElementById("cart").classList.remove("active");
document.getElementById("account").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* CHECKOUT */
function checkout(){

let slot=document.getElementById("slot").value;

if(!slot){
alert("Please select delivery slot");
return;
}

if(!user){
alert("Please login first");
return;
}

let msg="Order from The Meat Shop:%0A";

cart.forEach(i=>{
msg+=`${i.name} x${i.qty}%0A`;
});

msg+=`%0AName: ${user.name}%0ASlot: ${slot}`;

window.open("https://wa.me/447000000000?text="+msg);
}

/* DELIVERY */
function checkDelivery(){
alert("Delivery check stays same logic (can upgrade next step)");
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

update();

</script>

</body>
</html>
