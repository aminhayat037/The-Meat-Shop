<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f6f4f1;
color:#111;
}

/* TOP BAR */
.topbar{
background:#0e0e0e;
color:white;
display:flex;
justify-content:space-between;
padding:10px 20px;
font-size:13px;
}

.topbar div{cursor:pointer;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:white;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-family:"Playfair Display";
font-size:26px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.06);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product-info{
padding:12px;
}

.price{
color:#8b0000;
font-weight:500;
}

/* BUTTON */
button{
width:100%;
padding:10px;
border:none;
background:#0e0e0e;
color:white;
cursor:pointer;
}

button:hover{
background:#8b0000;
}

/* CART */
.cart-panel{
position:fixed;
top:0;
right:-420px;
width:360px;
height:100%;
background:white;
transition:0.3s ease;
box-shadow:-10px 0 30px rgba(0,0,0,0.2);
padding:15px;
z-index:2000;
}

.cart-panel.active{right:0}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}
.overlay.active{display:block}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.qty{
display:flex;
gap:6px;
align-items:center;
}

.qty button{
width:26px;
height:26px;
background:#eee;
color:#000;
border:none;
cursor:pointer;
}

.remove{
background:#ddd;
border:none;
padding:5px;
font-size:11px;
cursor:pointer;
}

/* DELIVERY */
.section{
margin:20px;
padding:20px;
background:white;
border-radius:10px;
}
</style>

</head>

<body>

<!-- TOP -->

<div class="topbar">
<div>🟢 100% Halal • Fresh Meat • Open Daily</div>
<div onclick="scrollToFind()">📍 Find Us</div>
</div>

<!-- HEADER -->

<header>
<div class="logo">The Meat Shop</div>
<div onclick="openCart()" style="cursor:pointer">
🛒 Cart (<span id="count">0</span>)
</div>
</header>

<!-- PRODUCTS -->

<section class="products" id="products"></section>

<!-- CART -->

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-panel" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<h3>Total: £<span id="total">0</span></h3>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>

<!-- POSTCODE CHECKER (NOW FIXED + VISIBLE) -->

<section class="section">
<h3>Check your postcode here to see if we deliver to your area</h3>

<input id="postcode" placeholder="Enter postcode">
<button onclick="checkDelivery()">Check Delivery</button>

<p id="deliveryResult"></p>
</section>

<!-- FIND -->

<section id="find" class="section">
<h2>Find Us</h2>
<p>Unit 5.1 Celebration Avenue, E20 1DB, London</p>

<iframe style="width:100%;height:300px;border:0;border-radius:10px;"
src="https://www.google.com/maps?q=E20+1DB&output=embed"></iframe>
</section>

<script>

const shopLat = 51.5433;
const shopLng = -0.0077;

const products = [
{name:"Beef Steak",price:12,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast",price:6,img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops",price:10,img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* RENDER PRODUCTS */
function renderProducts(){
const el = document.getElementById("products");
el.innerHTML = "";

products.forEach(p=>{
el.innerHTML += `
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<p class="price">£${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
</div>
</div>`;
});
}

/* ADD */
function addToCart(name,price){
const item = cart.find(i=>i.name===name);

if(item){
item.qty += 1;
} else {
cart.push({name,price,qty:1});
}

sync();
openCart();
}

/* UPDATE CART UI */
function renderCart(){
const el = document.getElementById("cartItems");
el.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{
total += item.price * item.qty;

el.innerHTML += `
<div class="cart-item">
<div>
<strong>${item.name}</strong><br>
£${item.price}
</div>

<div class="qty">
<button onclick="changeQty(${index},-1)">-</button>
<span>${item.qty}</span>
<button onclick="changeQty(${index},1)">+</button>
</div>

<button class="remove" onclick="removeItem(${index})">X</button>
</div>`;
});

document.getElementById("total").innerText = total;
document.getElementById("count").innerText = cart.reduce((a,b)=>a+b.qty,0);
}

/* SYNC */
function sync(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

/* QTY */
function changeQty(i,val){
cart[i].qty += val;

if(cart[i].qty <= 0){
cart.splice(i,1);
}

sync();
}

/* REMOVE */
function removeItem(i){
cart.splice(i,1);
sync();
}

/* CART UI */
function openCart(){
document.getElementById("cart").classList.add("active");
document.getElementById("overlay").classList.add("active");
renderCart();
}

function closeCart(){
document.getElementById("cart").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* CHECKOUT */
function checkout(){
let msg = "Order:%0A";

cart.forEach(i=>{
msg += `${i.name} x${i.qty}%0A`;
});

window.open("https://wa.me/447000000000?text="+msg);
}

/* POSTCODE CHECKER (FULLY RESTORED + WORKING) */
async function checkDelivery(){

const pc = document.getElementById("postcode").value;
const res = await fetch("https://api.postcodes.io/postcodes/" + pc);
const data = await res.json();

const out = document.getElementById("deliveryResult");

if(!data.result){
out.innerText = "Invalid postcode";
out.style.color = "red";
return;
}

/* distance formula */
function dist(lat1,lon1,lat2,lon2){
const R = 3958.8;
const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const d = dist(
shopLat,
shopLng,
data.result.latitude,
data.result.longitude
);

if(d <= 2){
out.innerText = "We deliver to your area (" + d.toFixed(2) + " miles)";
out.style.color = "green";
} else {
out.innerText = "Sorry, outside delivery area (" + d.toFixed(2) + " miles)";
out.style.color = "red";
}
}

/* INIT */
renderProducts();
renderCart();

</script>

</body>
</html>
