<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f6f4f1;
color:#111;
}

/* TOP BAR */
.topbar{
background:#0e0e0e;
color:white;
display:flex;
justify-content:space-between;
padding:10px 20px;
font-size:13px;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-family:"Playfair Display";
font-size:26px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product-info{
padding:12px;
}

.price{
color:#8b0000;
font-weight:500;
}

/* BUTTON */
button{
width:100%;
padding:10px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

button:hover{
background:#8b0000;
}

/* CART */
.cart-panel{
position:fixed;
top:0;
right:-420px;
width:360px;
height:100%;
background:white;
transition:0.3s;
box-shadow:-10px 0 30px rgba(0,0,0,0.2);
padding:15px;
z-index:2000;
}

.cart-panel.active{right:0}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}
.overlay.active{display:block}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.qty button{
width:26px;
height:26px;
background:#eee;
border:none;
cursor:pointer;
}

/* SECTION */
.section{
margin:20px;
padding:20px;
background:white;
border-radius:10px;
}
</style>

</head>

<body>

<!-- TOP BAR -->

<div class="topbar">
<div>🟢 100% Halal • Fresh Meat • Per KG Pricing</div>
<div onclick="scrollToFind()" style="cursor:pointer">📍 Find Us</div>
</div>

<!-- HEADER -->

<header>
<div class="logo">The Meat Shop</div>
<div onclick="openCart()" style="cursor:pointer">
🛒 Cart (<span id="count">0</span>)
</div>
</header>

<!-- PRODUCTS -->

<section class="products" id="products"></section>

<!-- CART -->

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-panel" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<h3>Total: £<span id="total">0</span></h3>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>

<!-- POSTCODE CHECK -->

<section class="section">
<h3>Check your postcode here to see if we deliver to your area</h3>
<input id="postcode" placeholder="Enter postcode">
<button onclick="checkDelivery()">Check</button>
<p id="deliveryResult"></p>
</section>

<!-- FIND US -->

<section class="section" id="find">
<h2>Find Us</h2>
<p>Unit 5.1 Celebration Avenue, E20 1DB, London</p>

<iframe style="width:100%;height:300px;border:0;border-radius:10px;"
src="https://www.google.com/maps?q=E20+1DB&output=embed"></iframe>
</section>

<script>

/* =========================
   🥩 PRODUCT DATABASE (PER KG)
   EDIT PRICES HERE ONLY
========================= */

const products = [
{name:"Beef Steak", price:12.99, img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Chicken Breast", price:6.99, img:"https://images.unsplash.com/photo-1604908176997-43144d1dbe68"},
{name:"Lamb Chops", price:11.99, img:"https://images.unsplash.com/photo-1604908177522-429c8b3f4eb2"},
{name:"Minced Beef", price:7.99, img:"https://images.unsplash.com/photo-1604908177000-2a0b3c4f4b11"},
{name:"Goat Meat", price:10.99, img:"https://images.unsplash.com/photo-1606756790138-261d2b21cd2f"},
{name:"Marinated Chicken", price:8.99, img:"https://images.unsplash.com/photo-1555939594-58d7cb561ad1"},
{name:"Whole Chicken", price:5.99, img:"https://images.unsplash.com/photo-1604503468506-a8da13d82791"},
{name:"Fish Fillet", price:9.99, img:"https://images.unsplash.com/photo-1544943910-4c1dc44aab44"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* =========================
   RENDER PRODUCTS
========================= */

function renderProducts(){
let box = document.getElementById("products");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML += `
<div class="product">
<img src="${p.img}">
<div class="product-info">
<h3>${p.name}</h3>
<p class="price">£${p.price} / kg</p>
<button onclick="add('${p.name}',${p.price})">Add to Cart</button>
</div>
</div>`;
});
}

renderProducts();

/* =========================
   CART FUNCTIONS
========================= */

function add(name,price){
let item = cart.find(i=>i.name===name);

if(item){
item.qty++;
} else {
cart.push({name,price,qty:1});
}

save();
update();
openCart();
}

function update(){
let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;

cart.forEach(i=>{
total += i.price * i.qty;

box.innerHTML += `
<div class="cart-item">
<div>
<strong>${i.name}</strong><br>
£${i.price}/kg
</div>

<div class="qty">
<button onclick="changeQty('${i.name}',-1)">-</button>
<span>${i.qty}kg</span>
<button onclick="changeQty('${i.name}',1)">+</button>
</div>
</div>`;
});

document.getElementById("total").innerText = total.toFixed(2);
document.getElementById("count").innerText = cart.reduce((a,b)=>a+b.qty,0);

save();
}

function changeQty(name,val){
let item = cart.find(i=>i.name===name);
if(!item) return;

item.qty += val;
if(item.qty <= 0){
cart = cart.filter(i=>i.name!==name);
}

update();
}

/* =========================
   CART UI
========================= */

function openCart(){
document.getElementById("cart").classList.add("active");
document.getElementById("overlay").classList.add("active");
update();
}

function closeCart(){
document.getElementById("cart").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* =========================
   CHECKOUT
========================= */

function checkout(){
let msg="Order:%0A";

cart.forEach(i=>{
msg += `${i.name} - ${i.qty}kg = £${(i.price*i.qty).toFixed(2)}%0A`;
});

window.open("https://wa.me/447000000000?text="+msg);
}

/* =========================
   POSTCODE CHECKER
========================= */

async function checkDelivery(){

const pc=document.getElementById("postcode").value;
const res=await fetch("https://api.postcodes.io/postcodes/"+pc);
const data=await res.json();

const out=document.getElementById("deliveryResult");

if(!data.result){
out.innerText="Invalid postcode";
out.style.color="red";
return;
}

const shopLat=51.5433;
const shopLng=-0.0077;

function dist(a,b,c,d){
const R=3958.8;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;

const x=
Math.sin(dLat/2)**2 +
Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;

return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

const d=dist(
shopLat,shopLng,
data.result.latitude,
data.result.longitude
);

if(d<=2){
out.innerText="We deliver to you ("+d.toFixed(2)+" miles)";
out.style.color="green";
}else{
out.innerText="Outside delivery area ("+d.toFixed(2)+" miles)";
out.style.color="red";
}
}

/* SAVE */
function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

update();

</script>

</body>
</html>
